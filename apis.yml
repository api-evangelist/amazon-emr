apis:
- name: Amazon EMR API
  description: >-
    The Amazon EMR API enables programmatic access to create, manage, and
    monitor big data clusters running Apache Spark, Hadoop, and other
    open-source frameworks. You can launch clusters, add processing steps,
    configure scaling policies, and manage cluster lifecycle.
