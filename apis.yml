name: Amazon EMR
description: >-
  Amazon EMR (Elastic MapReduce) is a cloud big data platform for processing
  vast amounts of data using open-source tools such as Apache Spark, Apache
  Hive, Apache HBase, Apache Flink, and Presto. EMR makes it simple to set
  up, operate, and scale big data environments for analyzing and processing
  data at scale.
