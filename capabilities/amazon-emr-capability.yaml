naftiko: 1.0.0-alpha2
info:
  label: Amazon EMR API
  description: Amazon EMR (Elastic MapReduce) provides a managed big data platform that simplifies running open-source frameworks
    such as Apache Spark and Hadoop to process and analyze vast amounts of data. This API enables you to create and manage
    clusters, add processing steps, configure auto-scaling, and monitor cluster health and performance.
  tags:
  - Amazon
  - Emr
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: amazon-emr
    baseUri: https://elasticmapreduce.us-east-1.amazonaws.com
    description: Amazon EMR API HTTP API.
    resources:
    - name: resource
      path: /
      operations:
      - name: runjobflow
        method: POST
        description: Amazon EMR Create and Start an EMR Cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: amazon-emr-rest
    description: REST adapter for Amazon EMR API.
    resources:
    - path: /
      name: runjobflow
      operations:
      - method: POST
        name: runjobflow
        description: Amazon EMR Create and Start an EMR Cluster
        call: amazon-emr.runjobflow
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: amazon-emr-mcp
    transport: http
    description: MCP adapter for Amazon EMR API for AI agent use.
    tools:
    - name: runjobflow
      description: Amazon EMR Create and Start an EMR Cluster
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-emr.runjobflow
      outputParameters:
      - type: object
        mapping: $.
