naftiko: 1.0.0-alpha1
info:
  label: Amazon EMR Management
  description: Unified capability for managing Amazon EMR resources. Combines Amazon EMR APIs for Data Engineer workflows in Big Data Processing.
  tags:
  - Amazon Web Services
  - Big Data
  - Analytics
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_API_KEY: AWS_API_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - import: emr
    location: ./shared/emr.yaml
  exposes:
  - type: rest
    port: 8188
    namespace: amazon-emr-workflow-api
    description: Unified REST API for Amazon EMR management.
    resources:
    - path: /v1/RunJobFlow
      name: RunJobFlow
      description: Amazon EMR Create and Start an EMR Cluster
      operations:
      - method: POST
        name: RunJobFlow
        description: Amazon EMR Create and Start an EMR Cluster
        call: api.RunJobFlow
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9198
    namespace: amazon-emr-mcp
    transport: http
    description: MCP server for AI-assisted Amazon EMR management.
    tools:
    - name: RunJobFlow
      description: Amazon EMR Create and Start an EMR Cluster
      hints:
        readOnly: false
      call: api.RunJobFlow
      outputParameters:
      - type: object
        mapping: $.
